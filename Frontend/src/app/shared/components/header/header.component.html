<header class="p-2 container border-bottom border-2">
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand">
        <img src="https://freshcart.codescandy.com/assets/images/logo/freshcart-logo.svg" alt="FreshCart logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02"
        aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item mb-2 mb-lg-0">
            <div class="d-flex me-3 ms-lg-5">
              <input (keyup.enter)="search()" [(ngModel)]="searchInput" class="form-control border-secondary border-end-0 rounded-0 rounded-start" type="search"
                placeholder="Search for Products" aria-label="Search" style="width: 17rem;">
              <button class="btn btn-outline-secondary border-start-0 rounded-0 rounded-end" type="submit">
                <i class="fa fa-search"></i>
              </button>
            </div>
          </li>
          <li class="nav-item mb-2 mb-lg-0">
            <select [(ngModel)]="category" (ngModelChange)="categorySearch($event)" class="form-select border-secondary" style="width: 12rem;">
              <option hidden>All Categories</option>
              <option *ngFor="let category of categories"> {{ category.categoryName }} </option>
            </select>
          </li>
        </ul>
        <div class="d-flex">
          <button *ngIf="!isAuthenticated()" class="btn btn-outline-success me-2" routerLink="/signup">Sign Up</button>
          <button *ngIf="!isAuthenticated()" class="btn btn-success" routerLink="/login">Sign In</button>
          <button *ngIf="isAuthenticated()" class="btn btn-success" (click)="logout()">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <nav *ngIf="isAuthenticated()" class="navbar navbar-expand navbar-light bg-light">
    <div class="container-fluid">
      <a *ngIf="!isAdmin()" class="navbar-brand" routerLink="/home">Hey {{ UserName() }}</a>
      <div class="navbar-collapse">
        <div *ngIf="!isAdmin()" class="navbar-nav">
          <a class="nav-link" [routerLink]="['/my-cart', getUserId()]"><i class="fa fa-cart-shopping"></i> My Cart</a>
          <a class="nav-link" routerLink="/my-orders"><i class="fa-solid fa-bag-shopping"></i> My Orders</a>
        </div>
      </div>
    </div>
  </nav>
</header>
